<div class="rb-navbar">
  <div class="rb-navbar-inner">
    <a class="rb-header-id" href="{{ "/" | relURL }}">
      {{ with site.Params.logo }}
      <img src="{{ . | relURL }}" alt="{{ site.Title }} logo">
      {{ end }}
      <span class="rb-header-name">{{ site.Params.shortTitle | default site.Title }}</span>
    </a>
    {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
  </div>
</div>
