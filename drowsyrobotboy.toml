baseURL = 'https://drowsyrobotboy.com'
languageCode = 'en-us'
title = 'drowsyrobotboy'
theme = 'naarinja'

[params]
    # Brand assets (live in the site's static/images/)
    logo = "/images/orange-rb.png"
    # No portrait on this persona's landing page (omit the param)

    # Typeface: Courier Prime for the drowsyrobotboy persona
    font = "courier-prime"

    # Dark mode: #222 background, #fff foreground
    mode = "dark"
    colorAccent = "#FF7D00"
    colorBg = "#222222"
    colorFg = "#ffffff"

    customIntro = "They call me Drowsy<a href=\"https://www.youtube.com/watch?v=Wbt59pmT26E&amp;ref=drowsyrobotboy.com\">RobotBoy</a> or I <del>make them</del> implore them to."
    customContact = "You can reach out to me at <a href=\"mailto:maruthisharma@live.in\">maruthisharma@live.in</a>"

[params.meta]
    favicon = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.highlight]
    noClasses = false     # Use CSS classes instead of inline styles
    style = "monokailight"      # base chroma classes; recolored to 3-color in main.css
    guessSyntax = true    # Detect language if nothing is specified
  [markup.goldmark.renderer]
    unsafe = true
