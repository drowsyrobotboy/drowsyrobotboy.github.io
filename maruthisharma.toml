baseURL = 'https://maruthisharma.com'
languageCode = 'en-us'
title = 'Maruthi Sharma Panchagnula'
theme = 'naarinja'

[params]
    # Short name shown in the internal-page header (falls back to title)
    shortTitle = "Maruthi Sharma"

    # Brand assets (live in the site's static/images/)
    logo = "/images/orange.png"
    portrait = "/images/portrait.jpg"
    heroRole = "Security Architect · Hyderabad, India"

    # Typeface: Ovo (default)
    font = "ovo"

    # Color mode + palette (passed to the theme; light for now).
    # Switch drowsyrobotboy.toml to mode = "dark" later without touching the theme.
    mode = "light"
    colorAccent = "#FF7D00"
    colorBg = "#ffffff"
    colorFg = "#222222"

    customIntro = ""
    customContact = "You can reach out to me at <a href=\"mailto:maruthisharma@live.in\">maruthisharma@live.in</a>"

# Note: the homepage experience sections and the closing contact CTA now live
# in content/_index.md front matter, so they render on every persona.

[params.meta]
    favicon = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.highlight]
    noClasses = false     # Use CSS classes instead of inline styles
    style = "monokailight"      # base chroma classes; recolored to 3-color in main.css
    guessSyntax = true    # Detect language if nothing is specified
  [markup.goldmark.renderer]
    unsafe = true
